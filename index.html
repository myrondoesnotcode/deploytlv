<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeployTLV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Barlow+Condensed:wght@800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0A0A0A;
      color: #EFEFEF;
      font-family: 'IBM Plex Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 40px;
      border-bottom: 1px solid #1A1A1A;
    }
    .logo {
      display: flex; align-items: center; gap: 14px;
    }
    .logo-circle {
      width: 44px; height: 44px;
      border: 2.5px solid #F5E642;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-circle span {
      font-family: 'Barlow Condensed', Impact, sans-serif;
      font-weight: 900; font-size: 16px;
      color: #F5E642; letter-spacing: -1px;
    }
    .logo-text {
      font-family: 'Barlow Condensed', Impact, sans-serif;
      font-weight: 900; font-size: 22px; letter-spacing: 3px;
      text-transform: uppercase; color: #EFEFEF;
    }
    .logo-text span { color: #F5E642; }
    .header-label {
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: #555;
    }

    /* ── Hero ── */
    .hero {
      padding: 80px 40px 60px;
      max-width: 900px;
    }
    .hero-eyebrow {
      font-size: 11px; letter-spacing: 5px; text-transform: uppercase;
      color: #555; margin-bottom: 20px;
    }
    .hero h1 {
      font-family: 'Barlow Condensed', Impact, sans-serif;
      font-weight: 900;
      font-size: clamp(56px, 10vw, 120px);
      line-height: 0.9;
      text-transform: uppercase;
      color: #EFEFEF;
      letter-spacing: -1px;
      margin-bottom: 0;
    }
    .hero h1 .yellow { color: #F5E642; }
    .hero-sub {
      margin-top: 28px;
      font-size: 11px; letter-spacing: 4px; text-transform: uppercase;
      color: #555;
      border-top: 1px solid #1A1A1A;
      padding-top: 20px;
    }
    .hero-sub span { color: #F5E642; }

    /* ── Event cards ── */
    .events-section {
      padding: 0 40px 80px;
      flex: 1;
    }
    .events-label {
      font-size: 10px; letter-spacing: 5px; text-transform: uppercase;
      color: #555; margin-bottom: 24px;
    }
    .events-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .event-card {
      width: 280px;
      border: 1px solid #333;
      padding: 28px 24px;
      display: flex; flex-direction: column; gap: 12px;
      text-decoration: none;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }
    .event-card.active {
      border-color: #F5E642;
      cursor: pointer;
    }
    .event-card.active:hover {
      transform: translateY(-2px);
      border-color: #fff;
    }
    .event-card.locked {
      border-color: #1E1E1E;
      cursor: default;
      opacity: 0.5;
    }

    .card-number {
      font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
      color: #555;
    }
    .event-card.active .card-number { color: #F5E642; }

    .card-title {
      font-family: 'Barlow Condensed', Impact, sans-serif;
      font-weight: 900; font-size: 32px; letter-spacing: 1px;
      text-transform: uppercase; color: #EFEFEF;
      line-height: 1;
    }

    .card-meta {
      font-size: 11px; letter-spacing: 2px; color: #555;
      text-transform: uppercase;
    }
    .event-card.active .card-meta { color: #888; }

    .card-divider {
      border: none; border-top: 1px solid #1A1A1A; margin: 4px 0;
    }
    .event-card.active .card-divider { border-color: #2A2A2A; }

    .card-cta {
      font-family: 'Barlow Condensed', Impact, sans-serif;
      font-weight: 900; font-size: 14px; letter-spacing: 3px;
      text-transform: uppercase; color: #F5E642;
    }
    .card-lock {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: #333;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-circle"><span>DE</span></div>
      <div class="logo-text">Deploy<span>TLV</span></div>
    </div>
    <div class="header-label">Builders Only.</div>
  </header>

  <section class="hero">
    <div class="hero-eyebrow">// Select your event</div>
    <h1>WHO'S<br>IN THE<br><span class="yellow">ROOM?</span></h1>
    <div class="hero-sub">Not spectators. &nbsp;<span>Builders.</span></div>
  </section>

  <section class="events-section">
    <div class="events-label">// Events</div>
    <div class="events-grid">

      <a class="event-card active" href="events/1/">
        <div class="card-number">Event #01</div>
        <div class="card-title">Deploy<br>TLV</div>
        <div class="card-meta">May 18 &nbsp;·&nbsp; TLV</div>
        <hr class="card-divider" />
        <div class="card-cta">Enter →</div>
      </a>

      <div class="event-card locked">
        <div class="card-number">Event #02</div>
        <div class="card-title">Deploy<br>TLV</div>
        <div class="card-meta">Coming soon</div>
        <hr class="card-divider" />
        <div class="card-lock">⌛ Locked</div>
      </div>

      <div class="event-card locked">
        <div class="card-number">Event #03</div>
        <div class="card-title">Deploy<br>TLV</div>
        <div class="card-meta">Coming soon</div>
        <hr class="card-divider" />
        <div class="card-lock">⌛ Locked</div>
      </div>

    </div>
  </section>

</body>
</html>
