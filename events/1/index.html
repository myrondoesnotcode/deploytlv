  <script>
    (function() {
      var STORAGE_KEY = 'deploytlv_event1_unlocked';
      var gate = document.getElementById('gate');

      if (localStorage.getItem(STORAGE_KEY)) {
        gate.style.display = 'none';
        return;
      }

      function unlock() {
        localStorage.setItem(STORAGE_KEY, 'true');
        gate.classList.add('fade-out');
        setTimeout(function() { gate.style.display = 'none'; }, 400);
      }

      function wrong() {
        var form = document.getElementById('gate-form');
        var err  = document.getElementById('gate-error');
        err.textContent = '// INCORRECT. TRY AGAIN.';
        form.classList.remove('shake');
        void form.offsetWidth;
        form.classList.add('shake');
        document.getElementById('gate-input').value = '';
      }

      document.getElementById('gate-btn').addEventListener('click', function() {
        var val = document.getElementById('gate-input').value.trim().toLowerCase();
        if (val === 'pinsker') { unlock(); } else { wrong(); }
      });

      document.getElementById('gate-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { document.getElementById('gate-btn').click(); }
      });
    })();
  </script>
